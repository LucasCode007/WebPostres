<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Postres</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="container">
    <h1>🍰 Gestión de Postres</h1>

    <div class="formulario">
      <input type="text" id="nombre" placeholder="Nombre del postre">
      <input type="number" id="tiempo" placeholder="Tiempo en minutos">
      <button onclick="crearPostre()">Guardar</button>
    </div>

    <h2>Lista de Postres</h2>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Tiempo (min)</th>
          <th>Unidad Alfajor</th>
        </tr>
      </thead>
      <tbody id="tabla-postres"></tbody>
    </table>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
